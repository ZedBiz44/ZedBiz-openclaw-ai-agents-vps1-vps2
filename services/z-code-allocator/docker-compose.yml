services:
  z-code-allocator:
    build: .
    image: zedbiz-z-code-allocator:1.0.0
    container_name: z-code-allocator
    restart: unless-stopped
    environment:
      ZCODE_DATABASE_PATH: /data/zcode.db
      ZCODE_API_KEYS_FILE: /run/secrets/api_keys.json
      ZCODE_ADMIN_AGENTS: edith
      ZCODE_RESERVATION_TTL_MINUTES: 60
      ZCODE_SWEEPER_INTERVAL_SECONDS: 60
      ZCODE_ALLOCATION_ENABLED: "${ZCODE_ALLOCATION_ENABLED:-false}"
    volumes:
      - ./data:/data
      - ./secrets/api_keys.json:/run/secrets/api_keys.json:ro
    networks:
      - openclaw
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8788/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 128m
    cpus: 0.50

  z-code-notion-mirror:
    build: .
    image: zedbiz-z-code-allocator:1.0.0
    container_name: z-code-notion-mirror
    restart: unless-stopped
    command: ["python", "-m", "app.mirror_worker"]
    environment:
      ZCODE_DATABASE_PATH: /data/zcode.db
      NOTION_API_TOKEN: ${NOTION_API_TOKEN}
      NOTION_ZCODE_DATABASE_ID: ${NOTION_ZCODE_DATABASE_ID}
      ZCODE_MIRROR_POLL_SECONDS: ${ZCODE_MIRROR_POLL_SECONDS:-15}
    volumes:
      - ./data:/data
    networks:
      - openclaw
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 96m
    cpus: 0.25

networks:
  openclaw:
    external: true
